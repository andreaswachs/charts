name: PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
      - 'Makefile'
      - '.yamllint.yaml'
      - '.github/workflows/pr.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Changed Charts
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.changes.outputs.charts }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed charts
        id: changes
        run: |
          charts=$(./scripts/changed-charts.sh origin/${{ github.base_ref }} ${{ github.sha }})
          if [ -n "$charts" ]; then
            echo "charts=$charts" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed charts: $charts"
          else
            echo "charts=" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No chart changes detected"
          fi

  lint:
    name: Lint Charts
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.lint.outputs.result }}
      details: ${{ steps.lint.outputs.details }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run helm lint
        id: lint
        run: |
          charts="${{ needs.detect-changes.outputs.charts }}"
          echo "Linting charts: $charts"

          result="success"
          details=""

          for chart in $charts; do
            echo "::group::Linting $chart"
            if output=$(helm lint "$chart" 2>&1); then
              echo "$output"
              details="${details}✅ \`$(basename $chart)\`: Passed\n"
            else
              echo "$output"
              result="failure"
              details="${details}❌ \`$(basename $chart)\`: Failed\n\`\`\`\n${output}\n\`\`\`\n"
            fi
            echo "::endgroup::"
          done

          echo "result=$result" >> $GITHUB_OUTPUT
          # Use a delimiter for multiline output
          {
            echo 'details<<EOF'
            echo -e "$details"
            echo EOF
          } >> $GITHUB_OUTPUT

          if [ "$result" = "failure" ]; then
            exit 1
          fi

  format:
    name: Check Formatting
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.format.outputs.result }}
      details: ${{ steps.format.outputs.details }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Check YAML formatting
        id: format
        run: |
          charts="${{ needs.detect-changes.outputs.charts }}"
          echo "Checking formatting for: $charts"

          result="success"
          details=""

          for chart in $charts; do
            echo "::group::Checking $chart"
            if output=$(yamllint -c .yamllint.yaml "$chart" 2>&1); then
              echo "No issues found"
              details="${details}✅ \`$(basename $chart)\`: Passed\n"
            else
              echo "$output"
              result="failure"
              details="${details}❌ \`$(basename $chart)\`: Issues found\n\`\`\`\n${output}\n\`\`\`\n"
            fi
            echo "::endgroup::"
          done

          echo "result=$result" >> $GITHUB_OUTPUT
          {
            echo 'details<<EOF'
            echo -e "$details"
            echo EOF
          } >> $GITHUB_OUTPUT

          if [ "$result" = "failure" ]; then
            exit 1
          fi

  template:
    name: Template with Defaults
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.template.outputs.result }}
      details: ${{ steps.template.outputs.details }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Test chart rendering
        id: template
        run: |
          charts="${{ needs.detect-changes.outputs.charts }}"
          echo "Testing template rendering for: $charts"

          result="success"
          details=""

          for chart in $charts; do
            name=$(basename "$chart")
            echo "::group::Templating $chart"
            if output=$(helm template "$name" "$chart" 2>&1); then
              echo "Rendered successfully"
              details="${details}✅ \`${name}\`: Renders successfully\n"
            else
              echo "$output"
              result="failure"
              details="${details}❌ \`${name}\`: Failed to render\n\`\`\`\n${output}\n\`\`\`\n"
            fi
            echo "::endgroup::"
          done

          echo "result=$result" >> $GITHUB_OUTPUT
          {
            echo 'details<<EOF'
            echo -e "$details"
            echo EOF
          } >> $GITHUB_OUTPUT

          if [ "$result" = "failure" ]; then
            exit 1
          fi

  unit-tests:
    name: Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.test.outputs.result }}
      details: ${{ steps.test.outputs.details }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false --version v1.0.3

      - name: Run unit tests
        id: test
        run: |
          charts="${{ needs.detect-changes.outputs.charts }}"
          echo "Running unit tests for: $charts"

          result="success"
          details=""

          for chart in $charts; do
            name=$(basename "$chart")
            if [ -d "$chart/tests" ]; then
              echo "::group::Testing $chart"
              if output=$(helm unittest "$chart" 2>&1); then
                echo "$output"
                # Extract test summary
                summary=$(echo "$output" | grep -E "^Tests:" || echo "Tests passed")
                details="${details}✅ \`${name}\`: ${summary}\n"
              else
                echo "$output"
                result="failure"
                details="${details}❌ \`${name}\`: Tests failed\n\`\`\`\n${output}\n\`\`\`\n"
              fi
              echo "::endgroup::"
            else
              details="${details}⏭️ \`${name}\`: No tests found\n"
            fi
          done

          echo "result=$result" >> $GITHUB_OUTPUT
          {
            echo 'details<<EOF'
            echo -e "$details"
            echo EOF
          } >> $GITHUB_OUTPUT

          if [ "$result" = "failure" ]; then
            exit 1
          fi

  version-check:
    name: Version Check
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.version.outputs.result }}
      details: ${{ steps.version.outputs.details }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check chart versions
        id: version
        run: |
          charts="${{ needs.detect-changes.outputs.charts }}"
          echo "Checking versions for: $charts"

          result="success"
          details=""

          for chart in $charts; do
            name=$(basename "$chart")
            echo "::group::Checking version for $chart"

            output=$(./scripts/check-version.sh "$chart" origin/${{ github.base_ref }} 2>&1) || exit_code=$?
            echo "$output"

            if [ "${exit_code:-0}" -eq 0 ]; then
              if echo "$output" | grep -q "NEW_CHART"; then
                version=$(echo "$output" | grep "Version:" | awk '{print $2}')
                details="${details}🆕 \`${name}\`: New chart (v${version})\n"
              else
                base_ver=$(echo "$output" | grep "Base version:" | awk '{print $3}')
                curr_ver=$(echo "$output" | grep "Current version:" | awk '{print $3}')
                details="${details}✅ \`${name}\`: v${base_ver} → v${curr_ver}\n"
              fi
            else
              result="failure"
              if echo "$output" | grep -q "unchanged"; then
                curr_ver=$(echo "$output" | grep "Current version:" | awk '{print $3}')
                details="${details}❌ \`${name}\`: Version not updated (still v${curr_ver})\n"
              elif echo "$output" | grep -q "decreased"; then
                base_ver=$(echo "$output" | grep "Base version:" | awk '{print $3}')
                curr_ver=$(echo "$output" | grep "Current version:" | awk '{print $3}')
                details="${details}❌ \`${name}\`: Version decreased (v${base_ver} → v${curr_ver})\n"
              else
                details="${details}❌ \`${name}\`: ${output}\n"
              fi
            fi
            echo "::endgroup::"
          done

          echo "result=$result" >> $GITHUB_OUTPUT
          {
            echo 'details<<EOF'
            echo -e "$details"
            echo EOF
          } >> $GITHUB_OUTPUT

          if [ "$result" = "failure" ]; then
            exit 1
          fi

  post-summary:
    name: Post Summary
    needs: [detect-changes, lint, format, template, unit-tests, version-check]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          CHARTS: ${{ needs.detect-changes.outputs.charts }}
          LINT_RESULT: ${{ needs.lint.outputs.result }}
          LINT_DETAILS: ${{ needs.lint.outputs.details }}
          FORMAT_RESULT: ${{ needs.format.outputs.result }}
          FORMAT_DETAILS: ${{ needs.format.outputs.details }}
          TEMPLATE_RESULT: ${{ needs.template.outputs.result }}
          TEMPLATE_DETAILS: ${{ needs.template.outputs.details }}
          TEST_RESULT: ${{ needs.unit-tests.outputs.result }}
          TEST_DETAILS: ${{ needs.unit-tests.outputs.details }}
          VERSION_RESULT: ${{ needs.version-check.outputs.result }}
          VERSION_DETAILS: ${{ needs.version-check.outputs.details }}
        with:
          script: |
            const charts = (process.env.CHARTS || '').split(' ').filter(c => c);

            const lintResult = process.env.LINT_RESULT || 'skipped';
            const lintDetails = process.env.LINT_DETAILS || '';

            const formatResult = process.env.FORMAT_RESULT || 'skipped';
            const formatDetails = process.env.FORMAT_DETAILS || '';

            const templateResult = process.env.TEMPLATE_RESULT || 'skipped';
            const templateDetails = process.env.TEMPLATE_DETAILS || '';

            const testResult = process.env.TEST_RESULT || 'skipped';
            const testDetails = process.env.TEST_DETAILS || '';

            const versionResult = process.env.VERSION_RESULT || 'skipped';
            const versionDetails = process.env.VERSION_DETAILS || '';

            const getIcon = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              return '⏭️';
            };

            const allPassed = [lintResult, formatResult, templateResult, testResult, versionResult]
              .every(r => r === 'success');

            const header = allPassed
              ? '## 🎉 All Chart Checks Passed!\n'
              : '## 📋 Chart Checks Summary\n';

            let body = header;
            body += `\n**Charts analyzed:** ${charts.map(c => '\`' + c.split('/').pop() + '\`').join(', ')}\n\n`;

            body += '| Check | Status |\n';
            body += '|-------|--------|\n';
            body += `| Lint | ${getIcon(lintResult)} ${lintResult} |\n`;
            body += `| Format | ${getIcon(formatResult)} ${formatResult} |\n`;
            body += `| Template | ${getIcon(templateResult)} ${templateResult} |\n`;
            body += `| Unit Tests | ${getIcon(testResult)} ${testResult} |\n`;
            body += `| Version | ${getIcon(versionResult)} ${versionResult} |\n`;

            body += '\n---\n\n';

            body += '<details>\n<summary>📝 Detailed Results</summary>\n\n';

            if (lintDetails) {
              body += '### 🔍 Lint\n' + lintDetails + '\n';
            }
            if (formatDetails) {
              body += '### 📐 Format\n' + formatDetails + '\n';
            }
            if (templateDetails) {
              body += '### 📄 Template\n' + templateDetails + '\n';
            }
            if (testDetails) {
              body += '### 🧪 Unit Tests\n' + testDetails + '\n';
            }
            if (versionDetails) {
              body += '### 🏷️ Version\n' + versionDetails + '\n';
            }

            body += '</details>\n';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Chart Checks')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
