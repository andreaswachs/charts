suite: pvc tests
templates:
  - pvc.yaml
tests:
  - it: should not render pvc when persistence is disabled
    set:
      image:
        repository: nginx
    asserts:
      - hasDocuments:
          count: 0

  - it: should render pvc when persistence is enabled
    release:
      name: my-release
    set:
      image:
        repository: nginx
      persistence:
        enabled: true
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: my-release-claw
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi
      - contains:
          path: spec.accessModes
          content: ReadWriteOnce

  - it: should not render pvc when existingClaim is set
    set:
      image:
        repository: nginx
      persistence:
        enabled: true
        existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should render pvc with custom size and access modes
    set:
      image:
        repository: nginx
      persistence:
        enabled: true
        size: 50Gi
        accessModes:
          - ReadWriteMany
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi
      - contains:
          path: spec.accessModes
          content: ReadWriteMany

  - it: should render pvc with storageClassName when set
    set:
      image:
        repository: nginx
      persistence:
        enabled: true
        storageClassName: gp3
    asserts:
      - equal:
          path: spec.storageClassName
          value: gp3

  - it: should not have storageClassName when empty
    set:
      image:
        repository: nginx
      persistence:
        enabled: true
    asserts:
      - isNull:
          path: spec.storageClassName

  - it: should include common labels and annotations
    set:
      image:
        repository: nginx
      persistence:
        enabled: true
      commonLabels:
        team: claw-bots
      commonAnnotations:
        managed-by: platform-team
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: claw-bots
      - equal:
          path: metadata.annotations["managed-by"]
          value: platform-team
