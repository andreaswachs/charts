suite: serviceaccount tests
templates:
  - serviceaccount.yaml
tests:
  - it: should not render serviceaccount when create is false
    set:
      image:
        repository: nginx
    asserts:
      - hasDocuments:
          count: 0

  - it: should render serviceaccount when create is true
    release:
      name: my-release
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: my-release-claw

  - it: should render serviceaccount with custom name
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should render serviceaccount annotations
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789:role/my-role

  - it: should render serviceaccount with custom labels
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
        labels:
          custom-label: custom-value
    asserts:
      - equal:
          path: metadata.labels["custom-label"]
          value: custom-value

  - it: should include common labels and annotations
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
      commonLabels:
        team: claw-bots
      commonAnnotations:
        managed-by: platform-team
    asserts:
      - equal:
          path: metadata.labels["team"]
          value: claw-bots
      - equal:
          path: metadata.annotations["managed-by"]
          value: platform-team

  - it: should merge serviceAccount and common annotations without overwriting
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
        annotations:
          sa-specific-key: sa-specific-value
      commonAnnotations:
        common-key: common-value
    asserts:
      - equal:
          path: metadata.annotations["sa-specific-key"]
          value: sa-specific-value
      - equal:
          path: metadata.annotations["common-key"]
          value: common-value
