suite: role tests
templates:
  - role.yaml
tests:
  - it: should render role when rbac.create is true with role rules
    release:
      name: my-release
    set:
      image:
        repository: nginx
      rbac:
        create: true
        role:
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list", "watch"]
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.name
          value: my-release-claw
      - equal:
          path: rules[0].apiGroups[0]
          value: ""
      - equal:
          path: rules[0].resources[0]
          value: pods
      - equal:
          path: rules[0].verbs[0]
          value: get
