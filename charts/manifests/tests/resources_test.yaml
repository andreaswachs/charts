suite: resources template tests
templates:
  - resources.yaml
tests:
  - it: should render nothing when resources is empty
    set:
      resources: []
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a single ConfigMap
    set:
      resources:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-config
          data:
            foo: bar
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: my-config
      - equal:
          path: data.foo
          value: bar

  - it: should render a single Secret
    set:
      resources:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: my-secret
          type: Opaque
          stringData:
            password: supersecret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: my-secret
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData.password
          value: supersecret

  - it: should render multiple resources
    set:
      resources:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: config-one
          data:
            key: value1
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: config-two
          data:
            key: value2
        - apiVersion: v1
          kind: Secret
          metadata:
            name: secret-one
          type: Opaque
          stringData:
            token: abc123
    asserts:
      - hasDocuments:
          count: 3

  - it: should render first resource correctly in multi-resource scenario
    set:
      resources:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: first-config
          data:
            order: first
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: second-config
          data:
            order: second
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: first-config
      - equal:
          path: data.order
          value: first

  - it: should render second resource correctly in multi-resource scenario
    set:
      resources:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: first-config
          data:
            order: first
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: second-config
          data:
            order: second
    documentIndex: 1
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: second-config
      - equal:
          path: data.order
          value: second

  - it: should render a Deployment resource
    set:
      resources:
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: my-app
            labels:
              app: my-app
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: my-app
            template:
              metadata:
                labels:
                  app: my-app
              spec:
                containers:
                  - name: app
                    image: nginx:1.21
                    ports:
                      - containerPort: 80
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: my-app
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginx:1.21
