suite: serviceaccount tests
templates:
  - serviceaccount.yaml
tests:
  - it: should not render serviceaccount when disabled
    set:
      image:
        repository: nginx
    asserts:
      - hasDocuments:
          count: 0

  - it: should render serviceaccount when enabled
    release:
      name: my-release
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: my-release-general-service

  - it: should render serviceaccount with custom name
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should render serviceaccount annotations
    set:
      image:
        repository: nginx
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789:role/my-role
