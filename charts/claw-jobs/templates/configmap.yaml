{{- range .Values.jobs }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claw-jobs.fullname" $ }}-{{ .name }}
  labels:
    {{- include "claw-jobs.labels" $ | nindent 4 }}
    {{- with $.Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with $.Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  {{ .name }}.bun.js: |
{{ .script | indent 4 }}
{{- end }}
