suite: test serviceaccount template
templates:
  - serviceaccount.yaml
release:
  name: my-release
  namespace: test-ns
tests:
  - it: renders ServiceAccount when serviceAccount.create is true
    set:
      serviceAccount:
        create: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: my-release-claw-jobs

  - it: does not render when serviceAccount.create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses custom service account name
    set:
      serviceAccount:
        create: true
        name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa
